<svg viewBox="0 0 780 400" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace">
  <defs>
    <linearGradient id="winGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2130"/>
      <stop offset="100%" stop-color="#161825"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2d3e"/>
      <stop offset="100%" stop-color="#232536"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="roundClip">
      <rect x="20" y="20" width="740" height="360" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <!-- Outer window shadow + frame -->
  <rect x="20" y="20" width="740" height="360" rx="10" ry="10" fill="#0d0f1a" filter="url(#shadow)"/>

  <!-- Window body -->
  <rect x="20" y="20" width="740" height="360" rx="10" ry="10" fill="url(#winGrad)" clip-path="url(#roundClip)"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="740" height="38" rx="10" ry="10" fill="url(#headerGrad)"/>
  <rect x="20" y="44" width="740" height="14" fill="url(#headerGrad)"/>
  <line x1="20" y1="58" x2="760" y2="58" stroke="#0d0f1a" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="46" cy="39" r="6.5" fill="#ff5f57"/>
  <circle cx="68" cy="39" r="6.5" fill="#febc2e"/>
  <circle cx="90" cy="39" r="6.5" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="390" y="44" text-anchor="middle" font-size="12" fill="#8888aa" letter-spacing="0.03em">adam@webserver01.prod.example.com: /var/log/nginx</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- TERMINAL CONTENT                          -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Label: Default host (green) -->
  <text x="44" y="96" font-size="10.5" fill="#555577" letter-spacing="0.05em">DEFAULT HOST  (non-matched hostname → green)</text>

  <!-- Prompt line 1 — default host -->
  <!-- Date/Time in Cyan -->
  <text x="44" y="118" font-size="13.5" fill="#00e5ff">Thu Jan 09 02:15 PM</text>
  <!-- space -->
  <!-- Hostname in Green -->
  <text x="232" y="118" font-size="13.5" fill="#00c853">webserver01.prod.example.com</text>

  <!-- Prompt line 2 — default host -->
  <!-- user in Magenta Bold -->
  <text x="44" y="138" font-size="13.5" fill="#d67fff" font-weight="bold">adam</text>
  <!-- @ in Neon Green -->
  <text x="87" y="138" font-size="13.5" fill="#39ff14">@</text>
  <!-- hostname: in Yellow -->
  <text x="101" y="138" font-size="13.5" fill="#ffd600">webserver01:</text>
  <!-- pwd in White -->
  <text x="210" y="138" font-size="13.5" fill="#e8eaf0">/var/log/nginx</text>
  <!-- ] in Neon Green -->
  <text x="349" y="138" font-size="13.5" fill="#39ff14">] </text>
  <!-- blinking cursor block -->
  <rect x="372" y="124" width="8" height="15" fill="#39ff14" opacity="0.9"/>

  <!-- Divider -->
  <line x1="44" y1="158" x2="736" y2="158" stroke="#1f2535" stroke-width="1"/>

  <!-- Label: Matched host (yellow + magenta keywords) -->
  <text x="44" y="178" font-size="10.5" fill="#555577" letter-spacing="0.05em">MATCHED HOST  (contains HOST1/HOST2 → yellow with magenta keyword highlights)</text>

  <!-- Prompt line 1 — matched host -->
  <text x="44" y="200" font-size="13.5" fill="#00e5ff">Thu Jan 09 02:15 PM</text>
  <!-- Full hostname in yellow, keyword in magenta -->
  <text x="232" y="200" font-size="13.5" fill="#ffd600">webserver01.</text>
  <text x="336" y="200" font-size="13.5" fill="#d67fff" font-weight="bold">int</text>
  <text x="363" y="200" font-size="13.5" fill="#ffd600">.prod.example.com</text>

  <!-- Prompt line 2 — matched host -->
  <text x="44" y="220" font-size="13.5" fill="#d67fff" font-weight="bold">adam</text>
  <text x="87" y="220" font-size="13.5" fill="#39ff14">@</text>
  <text x="101" y="220" font-size="13.5" fill="#ffd600">webserver01:</text>
  <text x="210" y="220" font-size="13.5" fill="#e8eaf0">~</text>
  <text x="227" y="220" font-size="13.5" fill="#39ff14">] </text>
  <rect x="250" y="206" width="8" height="15" fill="#39ff14" opacity="0.9"/>

  <!-- Divider -->
  <line x1="44" y1="240" x2="736" y2="240" stroke="#1f2535" stroke-width="1"/>

  <!-- PS2 continuation prompt label -->
  <text x="44" y="260" font-size="10.5" fill="#555577" letter-spacing="0.05em">PS2  (multi-line command continuation)</text>

  <!-- PS2 -->
  <text x="44" y="282" font-size="13.5" fill="#39ff14">continue-&gt; </text>
  <rect x="147" y="268" width="8" height="15" fill="#39ff14" opacity="0.9"/>

  <!-- Divider -->
  <line x1="44" y1="300" x2="736" y2="300" stroke="#1f2535" stroke-width="1"/>

  <!-- Color swatch row label -->
  <text x="44" y="320" font-size="10.5" fill="#555577" letter-spacing="0.05em">PROMPT COLOR PALETTE</text>

  <!-- Color swatches row -->
  <!-- Cyan -->
  <rect x="44" y="330" width="14" height="14" rx="3" fill="#00e5ff"/>
  <text x="63" y="341" font-size="10.5" fill="#00e5ff">Date/Time</text>

  <!-- Green -->
  <rect x="152" y="330" width="14" height="14" rx="3" fill="#00c853"/>
  <text x="171" y="341" font-size="10.5" fill="#00c853">Default Host</text>

  <!-- Yellow -->
  <rect x="267" y="330" width="14" height="14" rx="3" fill="#ffd600"/>
  <text x="286" y="341" font-size="10.5" fill="#ffd600">Matched Host / Path Label</text>

  <!-- Magenta -->
  <rect x="470" y="330" width="14" height="14" rx="3" fill="#d67fff"/>
  <text x="489" y="341" font-size="10.5" fill="#d67fff">User / Keyword</text>

  <!-- Neon Green -->
  <rect x="598" y="330" width="14" height="14" rx="3" fill="#39ff14"/>
  <text x="617" y="341" font-size="10.5" fill="#39ff14">@ / ] / Cursor</text>

  <!-- White -->
  <rect x="44" y="352" width="14" height="14" rx="3" fill="#e8eaf0"/>
  <text x="63" y="363" font-size="10.5" fill="#e8eaf0">Working Directory (PWD)</text>

</svg>
